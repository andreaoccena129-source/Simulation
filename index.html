<!DOCTYPE html>
<html>
<head>
  <title>Public Health Center System</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #78429c;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    header {
      background: #90b7df;
      color: #080808;
      padding: 15px;
      text-align: center;
      border-radius: 10px 10px 0 0;
      font-size: 14px;
    }
    .login-container {
      background: white;
      width: 100%;
      max-width: 400px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .form-content {
      padding: 30px;
    }
    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }
    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }
    input:focus, select:focus {
      border-color: #78429c;
      outline: none;
    }
    .password-wrapper {
      position: relative;
    }
    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #78429c;
      font-size: 18px;
      user-select: none;
    }
    button {
      width: 100%;
      background: #add8f5;
      color: #4b1544;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    button:hover {
      background: #2980b9;
      box-shadow: 0 8px 18px rgba(0,0,0,0.2);
      transform: translateY(-2px);
      color: white;
    }
    .forgot-pass {
      text-align: right;
      margin-top: 5px;
      margin-bottom: 15px;
    }
    .forgot-pass a {
      color: #78429c;
      text-decoration: none;
      font-size: 13px;
    }
    .forgot-pass a:hover {
      text-decoration: underline;
    }
    #error-message {
      color: #e74c3c;
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
      min-height: 18px;
    }
  </style>
</head>
<body>

<div class="login-container">
  <header>
    <h1>🏥 Public Health Center System</h1>
  </header>
  <div class="form-content">
    <form method="POST" action="simulation.html" onsubmit="return checkPasswords()">
    <h2>Login</h2>
    <form method="POST" action="simulation.html" onsubmit="return login()">
      <input type="text" id="username" placeholder="Username or Email" required><br>
      
      <!-- Password Field with Eye Icon -->
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Password" required>
        <span class="toggle-password" onclick="togglePass()">👁️</span>
      </div>
      
      <div class="forgot-pass">
        <a href="#">Forgot Password?</a>
      </div>

      <select id="role">
        <option value="admin">Admin</option>
        <option value="staff">Staff</option>
      </select><br>

      <button type="submit">Login</button>
      
      <div id="error-message"></div>
    </form>
  </div>
</div>

<script>
  function login() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const errorDiv = document.getElementById('error-message');
    
    if(user && pass) {
      alert('Login successful!');
      errorDiv.textContent = "";
      return true;
    } else {
      errorDiv.textContent = "⚠ Please enter both username and password.";
      return false;
    }
  }

  // Show/Hide Password Function
  function togglePass() {
    const passField = document.getElementById('password');
    const icon = document.querySelector('.toggle-password');
    
    if (passField.type === "password") {
      passField.type = "text";
      icon.textContent = "🙈"; // Change icon to hide
    } else {
      passField.type = "password";
      icon.textContent = "👁️"; // Change icon to show
    }
  }
</script>

</body>
</html>
